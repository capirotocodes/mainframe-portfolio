---
# Ansible Inventory for z/OS Sandbox and Linux patching targets
# Update the values below with your actual system details

all:
  children:
    zos_systems:
      hosts:
        zos_sandbox:
          ansible_host: 9.12.19.209
          ansible_user: ANDRE
          # Try to auto-detect Python, or use z/OSMF REST API instead
          ansible_python_interpreter: auto_silent

      vars:
        # z/OSMF Connection Details (Recommended - no Python needed)
        zmf_host: 9.12.19.209
        zmf_port: 443
        zmf_user: ANDRE

        # SSH Connection (if using direct SSH)
        ansible_connection: ssh
        ansible_port: 22

        # z/OS Specific Variables
        zos_hlq: ANDRE
        zos_volume: USER01

        # Workflow Directories
        workflow_repository: /var/zosmf/workflow_def
        workflow_instance_dir: /var/zosmf/workflow_instances

    webservers:
      hosts:
        web01:
          ansible_host: web01.example.com
        web02:
          ansible_host: web02.example.com
      vars:
        ansible_user: ec2-user
        ansible_connection: ssh
        ansible_port: 22
        ansible_become: true

    load_balancers:
      hosts:
        load_balancer_node:
          ansible_host: lb01.example.com
      vars:
        ansible_user: ec2-user
        ansible_connection: ssh
        ansible_port: 22

# Made with Bob
