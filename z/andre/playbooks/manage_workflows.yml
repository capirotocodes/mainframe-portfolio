---
# Ansible Playbook: Manage z/OSMF Workflows
# Operations: list, start, check status, delete workflows

- name: Manage z/OSMF Workflows
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    # Set operation: list, start, check, delete
    workflow_operation: "list"
    # For start/check/delete operations, provide workflow key
    workflow_key: ""
    
    # z/OSMF Connection (update these or use -e to override)
    zmf_host: "9.12.19.209"
    zmf_port: 443
    zmf_user: "ANDRE"
    zmf_password: "{{ lookup('env', 'ZOS_PASSWORD') }}"

  tasks:
    - name: List all workflows
      uri:
        url: "https://{{ zmf_host }}:{{ zmf_port }}/zosmf/workflow/rest/1.0/workflows"
        method: GET
        user: "{{ zmf_user }}"
        password: "{{ zmf_password }}"
        force_basic_auth: yes
        validate_certs: no
        return_content: yes
      register: workflow_list
      when: workflow_operation == "list"

    - name: Display workflow list
      debug:
        msg: "{{ workflow_list.json.workflows | default([]) }}"
      when: workflow_operation == "list"

    - name: Start workflow
      ibm.ibm_zosmf.zmf_workflow:
        zmf_host: "{{ zmf_host }}"
        zmf_port: "{{ zmf_port }}"
        zmf_user: "{{ zmf_user }}"
        zmf_password: "{{ zmf_password }}"
        workflow_key: "{{ workflow_key }}"
        state: "started"
      register: start_result
      when: workflow_operation == "start" and workflow_key != ""

    - name: Display start result
      debug:
        var: start_result
      when: workflow_operation == "start"

    - name: Check workflow status
      ibm.ibm_zosmf.zmf_workflow:
        zmf_host: "{{ zmf_host }}"
        zmf_port: "{{ zmf_port }}"
        zmf_user: "{{ zmf_user }}"
        zmf_password: "{{ zmf_password }}"
        workflow_key: "{{ workflow_key }}"
        state: "check"
      register: status_result
      when: workflow_operation == "check" and workflow_key != ""

    - name: Display workflow status
      debug:
        msg:
          - "Workflow Status: {{ status_result.workflow_status | default('N/A') }}"
          - "Progress: {{ status_result.workflow_progress | default('N/A') }}"
          - "Steps Completed: {{ status_result.steps_completed | default('N/A') }}"
      when: workflow_operation == "check"

    - name: Delete workflow
      ibm.ibm_zosmf.zmf_workflow:
        zmf_host: "{{ zmf_host }}"
        zmf_port: "{{ zmf_port }}"
        zmf_user: "{{ zmf_user }}"
        zmf_password: "{{ zmf_password }}"
        workflow_key: "{{ workflow_key }}"
        state: "deleted"
      register: delete_result
      when: workflow_operation == "delete" and workflow_key != ""

    - name: Display delete result
      debug:
        msg: "Workflow deleted successfully"
      when: workflow_operation == "delete" and delete_result is succeeded
