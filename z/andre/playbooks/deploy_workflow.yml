---
# Ansible Playbook: Deploy and Execute z/OSMF Workflow
# This playbook uploads a workflow definition to z/OSMF and creates an instance

- name: Deploy z/OSMF Workflow to Sandbox
  hosts: localhost
  gather_facts: true
  connection: local

  vars:
    workflow_name: "ANDRE_PROVISION_DATASETS"
    workflow_xml_local: "{{ playbook_dir }}/../workflows/sample_provision.xml"
    workflow_xml_remote: "/u/ANDRE/{{ workflow_name }}.xml"
    workflow_owner: "ANDRE"
    workflow_system: "9.12.19.209"

    # z/OSMF Connection
    zmf_host: "9.12.19.209"
    zmf_port: 443
    zmf_user: "ANDRE"
    zmf_password: "{{ lookup('env', 'ZOS_PASSWORD') }}"
    zos_hlq: "ANDRE"
    zos_volume: "USER01"

  tasks:
    - name: Display workflow information
      debug:
        msg:
          - "Deploying workflow: {{ workflow_name }}"
          - "Source file: {{ workflow_xml_local }}"
          - "Target location: {{ workflow_xml_remote }}"
          - "z/OSMF host: {{ zmf_host }}"

    - name: Convert XML to Unix format and read
      shell: |
        dos2unix < "{{ workflow_xml_local }}" 2>/dev/null || cat "{{ workflow_xml_local }}"
      register: workflow_xml_text

    - name: Upload workflow XML to z/OS home directory
      uri:
        url: "https://{{ zmf_host }}:{{ zmf_port }}/zosmf/restfiles/fs{{ workflow_xml_remote }}"
        method: PUT
        user: "{{ zmf_user }}"
        password: "{{ zmf_password }}"
        force_basic_auth: yes
        validate_certs: no
        body: "{{ workflow_xml_text.stdout }}"
        headers:
          Content-Type: "text/plain; charset=UTF-8"
          X-IBM-Data-Type: "text;fileEncoding=UTF-8"
        status_code: [200, 201, 204]
      register: upload_result

    - name: Display upload result
      debug:
        msg: "Workflow XML uploaded to {{ workflow_xml_remote }}"

    - name: Create workflow instance from uploaded file
      uri:
        url: "https://{{ zmf_host }}:{{ zmf_port }}/zosmf/workflow/rest/1.0/workflows"
        method: POST
        user: "{{ zmf_user }}"
        password: "{{ zmf_password }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          workflowName: "{{ workflow_name }}_{{ ansible_date_time.epoch }}"
          workflowDefinitionFile: "{{ workflow_xml_remote }}"
          system: "{{ workflow_system }}"
          owner: "{{ workflow_owner }}"
          variables:
            - name: "HLQ"
              value: "{{ zos_hlq }}.DEMO"
            - name: "VOLUME"
              value: "{{ zos_volume }}"
        status_code: [200, 201]
        return_content: yes
      register: workflow_result

    - name: Display workflow creation result
      debug:
        msg:
          - "Workflow Key: {{ workflow_result.workflow_key | default('N/A') }}"
          - "Workflow Status: {{ workflow_result.workflow_status | default('N/A') }}"
          - "Message: {{ workflow_result.msg | default('N/A') }}"

    - name: Save workflow key to file
      ansible.builtin.copy:
        content: |
          Workflow Name: {{ workflow_name }}
          Workflow Key: {{ workflow_result.workflow_key | default('N/A') }}
          Created: {{ ansible_date_time.iso8601 }}
          Status: {{ workflow_result.workflow_status | default('N/A') }}
        dest: "../workflows/last_workflow_info.txt"
      delegate_to: localhost
      when: workflow_result.workflow_key is defined

    - name: Instructions for next steps
      debug:
        msg:
          - "=========================================="
          - "Workflow deployed successfully!"
          - "=========================================="
          - "Access your workflow in z/OSMF:"
          - "1. Open z/OSMF in browser: https://{{ zmf_host }}:{{ zmf_port }}"
          - "2. Navigate to: Workflows > Workflows"
          - "3. Find workflow: {{ workflow_name }}_{{ ansible_date_time.epoch }}"
          - "4. Execute each step and monitor progress"
          - "=========================================="
      when: workflow_result is succeeded
