---
# Ansible Playbook: Orchestrated Zero-Downtime Patching
# Patches one web server at a time behind HAProxy with health validation.

- name: Orchestrated Zero-Downtime Patching
  hosts: webservers
  serial: 1
  become: true
  gather_facts: true

  vars:
    minimum_root_free_bytes: 5000000000
    haproxy_backend: app_pool
    haproxy_delegate_host: load_balancer_node
    health_check_protocol: http
    health_check_path: /health
    health_check_retries: 12
    health_check_delay: 10
    reboot_timeout_seconds: 600

  tasks:
    - name: Pre-Flight - Capture root mount details
      ansible.builtin.set_fact:
        root_mount: "{{ ansible_mounts | selectattr('mount', 'equalto', '/') | first }}"

    - name: Pre-Flight - Check disk space
      ansible.builtin.assert:
        that:
          - root_mount is defined
          - root_mount.size_available | int > minimum_root_free_bytes
        fail_msg: >-
          Root filesystem free space is below required threshold.
          Required: {{ minimum_root_free_bytes }} bytes,
          Available: {{ root_mount.size_available | default('unknown') }} bytes.
        success_msg: >-
          Root filesystem has sufficient free space:
          {{ root_mount.size_available }} bytes available.

    - name: Isolate - Disable server in HAProxy
      community.general.haproxy:
        state: disabled
        host: "{{ inventory_hostname }}"
        backend: "{{ haproxy_backend }}"
      delegate_to: "{{ haproxy_delegate_host }}"

    - name: Execution - Apply OS Updates
      ansible.builtin.dnf:
        name: "*"
        state: latest
        security: true

    - name: Execution - Reboot the server
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout_seconds }}"

    - name: Validation - Wait for application health endpoint
      ansible.builtin.uri:
        url: "{{ health_check_protocol }}://{{ inventory_hostname }}{{ health_check_path }}"
        status_code: 200
      register: health_result
      until: health_result.status == 200
      retries: "{{ health_check_retries }}"
      delay: "{{ health_check_delay }}"

    - name: Restoration - Enable server in HAProxy
      community.general.haproxy:
        state: enabled
        host: "{{ inventory_hostname }}"
        backend: "{{ haproxy_backend }}"
      delegate_to: "{{ haproxy_delegate_host }}"
