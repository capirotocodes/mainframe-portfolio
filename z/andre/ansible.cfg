[defaults]
# Ansible Configuration for z/OS Automation

# Inventory
inventory = ./inventory/hosts.yml

# Disable host key checking for lab environments
host_key_checking = False

# Connection settings
timeout = 30
remote_user = ANDRE

# Output settings - Updated for ansible-core 2.13+
stdout_callback = default
result_format = yaml
bin_ansible_callbacks = True

# Logging
log_path = ./ansible.log

# Retry files
retry_files_enabled = False

# Collections path (if using local collections)
collections_paths = ~/.ansible/collections:/usr/share/ansible/collections

[inventory]
enable_plugins = yaml, ini

[privilege_escalation]
become = False

[ssh_connection]
# SSH settings for z/OS USS
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

